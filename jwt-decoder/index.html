<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d1117">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' fill='%230d1117' rx='40'/%3E%3Ctext x='96' y='130' font-size='100' text-anchor='middle'%3E%F0%9F%94%91%3C/text%3E%3C/svg%3E">
    <title>JWT Decoder - Inspect JSON Web Tokens</title>
    <link rel="icon" href="favicon.ico" sizes="any">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%230d1117' rx='20'/%3E%3Ctext x='50' y='65' font-size='50' text-anchor='middle'%3E🔑%3C/text%3E%3C/svg%3E" type="image/svg+xml">
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --surface-hover: #21262d;
            --border: #30363d;
            --text: #c9d1d9;
            --text-secondary: #8b949e;
            --accent: #58a6ff;
            --success: #238636;
            --error: #da3633;
            --warning: #d29922;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        h1 { font-size: 1.5rem; display: flex; align-items: center; gap: 0.5rem; }
        .toolbar { display: flex; gap: 0.5rem; }
        button {
            background: var(--surface-hover);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        button:hover { background: var(--border); }
        button.primary { background: var(--accent); color: var(--bg); border-color: var(--accent); }
        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 300px;
        }
        .panel-header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 1rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .panel-body {
            flex: 1;
            overflow: auto;
            position: relative;
        }
        textarea {
            width: 100%;
            height: 100%;
            background: var(--bg);
            border: none;
            color: var(--text);
            padding: 1rem;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 13px;
            line-height: 1.5;
            resize: none;
            outline: none;
        }
        .jwt-display {
            padding: 1rem;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 13px;
            line-height: 1.6;
        }
        .jwt-part {
            margin-bottom: 1.5rem;
            padding: 1rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
        }
        .jwt-part-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
        }
        .jwt-part-title {
            font-weight: 600;
            color: var(--accent);
        }
        .jwt-part-badge {
            font-size: 0.75rem;
            padding: 0.2rem 0.5rem;
            background: var(--bg);
            border-radius: 4px;
            color: var(--text-secondary);
        }
        .jwt-part-content {
            white-space: pre-wrap;
            word-break: break-all;
        }
        .json-key { color: #7ee787; }
        .json-string { color: #a5d6ff; }
        .json-number { color: #79c0ff; }
        .json-boolean { color: #ff7b72; }
        .error-bar {
            background: var(--error);
            color: white;
            padding: 0.75rem 1rem;
            display: none;
        }
        .error-bar.show { display: block; }
        .expiry-badge {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            margin-left: 0.5rem;
        }
        .expiry-valid { background: var(--success); color: white; }
        .expiry-expired { background: var(--error); color: white; }
        .expiry-soon { background: var(--warning); color: black; }
        .sample-jwts {
            padding: 1rem;
            background: var(--surface);
            border-top: 1px solid var(--border);
        }
        .sample-jwts h3 {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }
        .sample-list {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .sample-btn {
            font-size: 0.8rem;
            padding: 0.4rem 0.75rem;
        }
        footer {
            text-align: center;
            padding: 1rem;
            color: var(--text-secondary);
            font-size: 0.8rem;
            border-top: 1px solid var(--border);
        }
        @media (max-width: 768px) {
            .container { flex-direction: column; }
            .panel { min-height: 300px; }
        }
    </style>
</head>
<body>
    <header>
        <h1>🔑 JWT Decoder</h1>
        <div class="toolbar">
            <button onclick="decodeJWT()">Decode</button>
            <button onclick="clearAll()">Clear</button>
            <button class="primary" onclick="copyPayload()">Copy Payload</button>
        </div>
    </header>
    <div class="error-bar" id="errorBar"></div>
    
    <div class="container">
        <div class="panel">
            <div class="panel-header">JWT Token</div>
            <div class="panel-body">
                <textarea id="jwtInput" placeholder="Paste JWT here..." spellcheck="false">eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiaWF0IjoxNTE2MjM5MDIyLCJleHAiOjE4OTM0NTYwMDB9.TJVA95OrM7E2cBab30RMHrHDcEfxjoYZgeFONFh7HgQ</textarea>
            </div>
        </div>
        
        <div class="panel">
            <div class="panel-header">Decoded</div>
            <div class="panel-body">
                <div class="jwt-display" id="jwtOutput"></div>
            </div>
        </div>
    </div>
    
    <div class="sample-jwts">
        <h3>Sample Tokens</h3>
        <div class="sample-list">
            <button class="sample-btn" onclick="loadSample('simple')">Simple</button>
            <button class="sample-btn" onclick="loadSample('admin')">Admin</button>
            <button class="sample-btn" onclick="loadSample('expired')">Expired</button>
            <button class="sample-btn" onclick="loadSample('firebase')">Firebase</button>
        </div>
    </div>
    
    <footer>Built with ❤️ by QQ & <a href="https://qqshi13.github.io/nova/" target="_blank">Nova ☄️</a></footer>

    <script src="../shared/utils.js"></script>
    <script>
        const samples = {
            simple: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiaWF0IjoxNTE2MjM5MDIyLCJleHAiOjE4OTM0NTYwMDB9.TJVA95OrM7E2cBab30RMHrHDcEfxjoYZgeFONFh7HgQ',
            admin: 'eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJhZG1pbiIsInJvbGUiOiJhZG1pbmlzdHJhdG9yIiwicGVybWlzc2lvbnMiOlsicmVhZCIsIndyaXRlIiwiZGVsZXRlIl0sImlhdCI6MTUxNjIzOTAyMn0.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c',
            expired: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiaWF0IjoxNTE2MjM5MDIyLCJleHAiOjE1MTYyMzkwMjJ9.4AdcjSOPqqJ1TXkLLKJ_sTlx-FaM1xKfTaK02j5drjU',
            firebase: 'eyJhbGciOiJSUzI1NiIsImtpZCI6IjEyMzQ1Njc4OTAifQ.eyJpc3MiOiJodHRwczovL3NlY3VyZXRva2VuLmdvb2dsZS5jb20vcHJvamVjdCIsImF1ZCI6InByb2plY3QiLCJhdXRoX3RpbWUiOjE1MTYyMzkwMjIsInVzZXJfaWQiOiJ1c2VyMTIzIiwic3ViIjoidXNlcjEyMyIsImlhdCI6MTUxNjIzOTAyMn0.invalid'
        };

        const jwtInput = document.getElementById('jwtInput');
        const jwtOutput = document.getElementById('jwtOutput');
        const errorBar = document.getElementById('errorBar');

        jwtInput.addEventListener('input', Utils.debounce(decodeJWT, 300));
        
        jwtInput.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                decodeJWT();
            }
        });



        function decodeJWT() {
            const token = jwtInput.value.trim();
            if (!token) {
                jwtOutput.innerHTML = '';
                hideError();
                return;
            }

            const parts = token.split('.');
            if (parts.length !== 3) {
                showError('Invalid JWT format. Expected 3 parts separated by dots.');
                jwtOutput.innerHTML = '';
                return;
            }

            try {
                const header = JSON.parse(base64UrlDecode(parts[0]));
                const payload = JSON.parse(base64UrlDecode(parts[1]));
                const signature = parts[2];

                hideError();
                renderJWT(header, payload, signature);
            } catch (e) {
                showError('Failed to decode JWT: ' + e.message);
                jwtOutput.innerHTML = '';
            }
        }

        function base64UrlDecode(str) {
            // Add padding if needed
            const padding = 4 - str.length % 4;
            if (padding !== 4) {
                str += '='.repeat(padding);
            }
            // Replace URL-safe characters
            str = str.replace(/-/g, '+').replace(/_/g, '/');
            
            // CRITICAL FIX: Add error handling for invalid base64
            try {
                return atob(str);
            } catch (e) {
                throw new Error('Invalid base64 encoding in token');
            }
        }

        function renderJWT(header, payload, signature) {
            let expiryBadge = '';
            if (payload.exp) {
                const expDate = new Date(payload.exp * 1000);
                const now = new Date();
                const isExpired = expDate < now;
                const isSoon = !isExpired && (expDate - now) < 24 * 60 * 60 * 1000;
                const diff = Math.floor((expDate - now) / 1000);
                const days = Math.floor(diff / 86400);
                
                let badgeClass = isExpired ? 'expiry-expired' : (isSoon ? 'expiry-soon' : 'expiry-valid');
                let badgeText = isExpired ? 'EXPIRED' : (days > 0 ? `${days}d left` : 'Expires soon');
                expiryBadge = `<span class="expiry-badge ${badgeClass}">${badgeText}</span>`;
            }

            jwtOutput.innerHTML = `
                <div class="jwt-part">
                    <div class="jwt-part-header">
                        <span class="jwt-part-title">HEADER</span>
                        <span class="jwt-part-badge">Algorithm & Type</span>
                    </div>
                    <div class="jwt-part-content">${syntaxHighlight(header)}</div>
                </div>
                
                <div class="jwt-part">
                    <div class="jwt-part-header">
                        <span class="jwt-part-title">PAYLOAD</span>
                        <span class="jwt-part-badge">Data</span>
                        ${expiryBadge}
                    </div>
                    <div class="jwt-part-content">${syntaxHighlight(payload)}</div>
                </div>
                
                <div class="jwt-part">
                    <div class="jwt-part-header">
                        <span class="jwt-part-title">SIGNATURE</span>
                        <span class="jwt-part-badge">Verification</span>
                    </div>
                    <div class="jwt-part-content" style="color: var(--text-secondary); word-break: break-all;">
                        ${signature}
                    </div>
                </div>
            `;
        }

        function syntaxHighlight(obj) {
            const json = JSON.stringify(obj, null, 2);
            return json.replace(/(".*?"):/g, '<span class="json-key">$1</span>:')
                       .replace(/: (".*?")/g, ': <span class="json-string">$1</span>')
                       .replace(/: (\d+)/g, ': <span class="json-number">$1</span>')
                       .replace(/: (true|false)/g, ': <span class="json-boolean">$1</span>');
        }

        function loadSample(type) {
            jwtInput.value = samples[type];
            decodeJWT();
        }

        function clearAll() {
            jwtInput.value = '';
            jwtOutput.innerHTML = '';
            hideError();
        }

        async function copyPayload() {
            const token = jwtInput.value.trim();
            if (!token) {
                showError('No JWT token to copy');
                return;
            }
            
            const parts = token.split('.');
            if (parts.length !== 3) {
                showError('Cannot copy: Invalid JWT format');
                return;
            }
            
            try {
                const payload = JSON.parse(base64UrlDecode(parts[1]));
                const success = await Utils.copyToClipboard(JSON.stringify(payload, null, 2));
                
                const btn = document.querySelector('button.primary');
                const original = btn.textContent;
                btn.textContent = success ? 'Copied!' : 'Failed!';
                setTimeout(() => btn.textContent = original, 1500);
                
                if (!success) {
                    showError('Failed to copy to clipboard');
                }
            } catch (e) {
                showError('Failed to decode payload for copying');
            }
        }

        function showError(msg) {
            errorBar.textContent = '❌ ' + msg;
            errorBar.classList.add('show');
        }

        function hideError() {
            errorBar.classList.remove('show');
        }

        // Decode on load
        decodeJWT();
    </script>
</body>
</html>
