name: Validate PWA

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  validate-pwa:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check manifest.json exists
        run: test -f manifest.json

      - name: Check service worker exists
        run: test -f sw.js

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.14.x

      - name: Run Lighthouse CI (PWA checks)
        run: |
          lhci autorun --config=lighthouserc.json || true
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.GITHUB_TOKEN }}
