<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keycode Logger - Keyboard Event Debugger</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E⌨️%3C/text%3E%3C/svg%3E">
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --surface-hover: #21262d;
            --border: #30363d;
            --text: #c9d1d9;
            --text-secondary: #8b949e;
            --accent: #58a6ff;
            --accent-hover: #79c0ff;
            --success: #238636;
            --warning: #d29922;
            --error: #da3633;
            --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --font-mono: 'JetBrains Mono', 'Fira Code', 'SF Mono', Monaco, monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        h1 {
            font-size: 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: normal;
        }

        .controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-family: inherit;
            transition: all 0.15s;
        }

        .btn:hover {
            background: var(--surface-hover);
            border-color: var(--text-secondary);
        }

        .btn.primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #000;
        }

        .btn.primary:hover {
            background: var(--accent-hover);
        }

        .btn.active {
            background: var(--success);
            border-color: var(--success);
            color: #fff;
        }

        main {
            flex: 1;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .capture-zone {
            background: var(--surface);
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 48px 24px;
            text-align: center;
            transition: all 0.2s;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 16px;
        }

        .capture-zone.listening {
            border-color: var(--accent);
            background: rgba(88, 166, 255, 0.05);
        }

        .capture-zone.captured {
            border-color: var(--success);
            border-style: solid;
        }

        .zone-icon {
            font-size: 48px;
            opacity: 0.5;
        }

        .zone-text {
            font-size: 15px;
            color: var(--text-secondary);
        }

        .zone-hint {
            font-size: 12px;
            color: var(--text-secondary);
            opacity: 0.7;
        }

        .last-event {
            width: 100%;
            max-width: 800px;
        }

        .event-title {
            font-size: 13px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .event-display {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 24px;
            font-family: var(--font-mono);
        }

        .key-combo {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .key {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 8px 14px;
            font-size: 14px;
            min-width: 40px;
            text-align: center;
            box-shadow: 0 2px 0 var(--border);
        }

        .key.modifier {
            background: rgba(88, 166, 255, 0.1);
            border-color: var(--accent);
        }

        .key.main {
            background: rgba(35, 134, 54, 0.15);
            border-color: var(--success);
            font-size: 16px;
            font-weight: 600;
        }

        .plus {
            color: var(--text-secondary);
            font-size: 12px;
        }

        .event-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }

        .event-field {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .field-label {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .field-value {
            font-size: 14px;
            color: var(--text);
            font-family: var(--font-mono);
            word-break: break-all;
        }

        .field-value.code {
            color: var(--accent);
        }

        .field-value.number {
            color: #79c0ff;
        }

        .field-value.boolean {
            color: #ff7b72;
        }

        .history-section {
            margin-top: 8px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .history-list {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            max-height: 300px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.15s;
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .history-item:hover {
            background: var(--surface-hover);
        }

        .history-item .time {
            font-size: 11px;
            color: var(--text-secondary);
            font-family: var(--font-mono);
            min-width: 60px;
        }

        .history-item .combo {
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 1;
            flex-wrap: wrap;
        }

        .history-item .mini-key {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 2px 8px;
            font-size: 12px;
            font-family: var(--font-mono);
        }

        .history-item .event-type {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            padding: 2px 8px;
            background: var(--bg);
            border-radius: 4px;
        }

        .empty-state {
            padding: 32px;
            text-align: center;
            color: var(--text-secondary);
            font-size: 13px;
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .checkbox-wrapper input[type="checkbox"] {
            accent-color: var(--accent);
        }

        .copy-toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--success);
            color: #fff;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 13px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s;
            pointer-events: none;
        }

        .copy-toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        @media (max-width: 600px) {
            header {
                padding: 16px;
            }

            h1 {
                font-size: 16px;
            }

            main {
                padding: 16px;
            }

            .capture-zone {
                padding: 32px 16px;
            }

            .event-grid {
                grid-template-columns: 1fr;
            }

            .key-combo {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>
            ⌨️ Keycode Logger
            <span class="subtitle">Press any key to see event details</span>
        </h1>
        <div class="controls">
            <button class="btn" id="clearBtn">Clear History</button>
            <button class="btn primary" id="copyBtn">Copy Last</button>
        </div>
    </header>

    <main>
        <div class="capture-zone" id="captureZone">
            <div class="zone-icon" id="zoneIcon">⌨️</div>
            <div class="zone-text" id="zoneText">Press any key to capture event</div>
            <div class="zone-hint">Keyboard events will be captured here</div>
        </div>

        <div class="last-event" id="lastEvent" style="display: none;">
            <div class="event-title">Last Event</div>
            <div class="event-display">
                <div class="key-combo" id="keyCombo"></div>
                <div class="event-grid" id="eventGrid"></div>
            </div>
        </div>

        <div class="history-section">
            <div class="section-header">
                <span class="event-title">Event History</span>
                <label class="checkbox-wrapper">
                    <input type="checkbox" id="preventDefault" checked>
                    Prevent default on arrow keys / space
                </label>
            </div>
            <div class="history-list" id="historyList">
                <div class="empty-state">No events captured yet. Press a key to start.</div>
            </div>
        </div>
    </main>

    <div class="copy-toast" id="copyToast">Copied to clipboard!</div>

    <script>
        const captureZone = document.getElementById('captureZone');
        const zoneIcon = document.getElementById('zoneIcon');
        const zoneText = document.getElementById('zoneText');
        const lastEventSection = document.getElementById('lastEvent');
        const keyCombo = document.getElementById('keyCombo');
        const eventGrid = document.getElementById('eventGrid');
        const historyList = document.getElementById('historyList');
        const clearBtn = document.getElementById('clearBtn');
        const copyBtn = document.getElementById('copyBtn');
        const copyToast = document.getElementById('copyToast');
        const preventDefaultCheckbox = document.getElementById('preventDefault');

        let eventHistory = [];
        let lastEventData = null;

        const modifierKeys = ['Control', 'Alt', 'Shift', 'Meta'];

        function formatTime(date) {
            return date.toLocaleTimeString('en-US', {
                hour12: false,
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
        }

        function getModifierKeys(e) {
            const modifiers = [];
            if (e.ctrlKey) modifiers.push('Ctrl');
            if (e.altKey) modifiers.push('Alt');
            if (e.shiftKey) modifiers.push('Shift');
            if (e.metaKey) modifiers.push('Meta');
            return modifiers;
        }

        function getKeyComboString(e) {
            const modifiers = getModifierKeys(e);
            if (modifierKeys.includes(e.key)) {
                return modifiers.join('+') || e.key;
            }
            return [...modifiers, e.key].join('+');
        }

        function renderKeyCombo(e) {
            const modifiers = getModifierKeys(e);
            const isModifier = modifierKeys.includes(e.key);
            
            let html = '';
            
            modifiers.forEach((mod, i) => {
                html += `<span class="key modifier">${mod}</span>`;
                if (i < modifiers.length - 1 || !isModifier) {
                    html += `<span class="plus">+</span>`;
                }
            });
            
            if (!isModifier) {
                html += `<span class="key main">${e.key === ' ' ? 'Space' : e.key}</span>`;
            }
            
            return html;
        }

        function renderEventFields(e) {
            const fields = [
                { label: 'event.key', value: e.key, type: 'code' },
                { label: 'event.code', value: e.code, type: 'code' },
                { label: 'event.keyCode', value: e.keyCode, type: 'number' },
                { label: 'event.which', value: e.which, type: 'number' },
                { label: 'event.location', value: e.location, type: 'number' },
                { label: 'event.repeat', value: e.repeat, type: 'boolean' },
                { label: 'ctrlKey', value: e.ctrlKey, type: 'boolean' },
                { label: 'altKey', value: e.altKey, type: 'boolean' },
                { label: 'shiftKey', value: e.shiftKey, type: 'boolean' },
                { label: 'metaKey', value: e.metaKey, type: 'boolean' }
            ];

            return fields.map(field => `
                <div class="event-field">
                    <span class="field-label">${field.label}</span>
                    <span class="field-value ${field.type}">${field.value}</span>
                </div>
            `).join('');
        }

        function addToHistory(e) {
            const now = new Date();
            const combo = getKeyComboString(e);
            
            eventHistory.unshift({
                time: now,
                combo: combo,
                event: e,
                key: e.key,
                code: e.code
            });

            // Keep only last 50
            if (eventHistory.length > 50) {
                eventHistory = eventHistory.slice(0, 50);
            }

            renderHistory();
        }

        function renderMiniKey(text) {
            if (text === ' ') return '<span class="mini-key">Space</span>';
            return `<span class="mini-key">${text}</span>`;
        }

        function renderHistory() {
            if (eventHistory.length === 0) {
                historyList.innerHTML = '<div class="empty-state">No events captured yet. Press a key to start.</div>';
                return;
            }

            historyList.innerHTML = eventHistory.map((item, index) => {
                const keys = item.combo.split('+');
                return `
                    <div class="history-item" data-index="${index}">
                        <span class="time">${formatTime(item.time)}</span>
                        <div class="combo">
                            ${keys.map(renderMiniKey).join('')}
                        </div>
                        <span class="event-type">${item.event.type}</span>
                    </div>
                `;
            }).join('');

            // Add click handlers
            document.querySelectorAll('.history-item').forEach(item => {
                item.addEventListener('click', () => {
                    const index = parseInt(item.dataset.index);
                    const historyItem = eventHistory[index];
                    if (historyItem) {
                        displayEvent(historyItem.event);
                    }
                });
            });
        }

        function displayEvent(e) {
            lastEventData = e;
            
            captureZone.classList.add('captured');
            zoneIcon.textContent = '✓';
            zoneText.textContent = `${e.type}: ${getKeyComboString(e)}`;
            document.querySelector('.zone-hint').textContent = 'Event captured!';

            keyCombo.innerHTML = renderKeyCombo(e);
            eventGrid.innerHTML = renderEventFields(e);
            lastEventSection.style.display = 'block';
        }

        function handleKeyEvent(e) {
            // Prevent default for certain keys if checkbox is checked
            if (preventDefaultCheckbox.checked) {
                const preventKeys = ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' ', 'Tab'];
                if (preventKeys.includes(e.key) || (e.key === ' ' && e.target === document.body)) {
                    e.preventDefault();
                }
            }

            displayEvent(e);
            addToHistory(e);
        }

        function showToast(message) {
            copyToast.textContent = message;
            copyToast.classList.add('show');
            setTimeout(() => {
                copyToast.classList.remove('show');
            }, 2000);
        }

        // Event listeners
        document.addEventListener('keydown', handleKeyEvent);
        document.addEventListener('keyup', handleKeyEvent);

        // Capture zone click to focus
        captureZone.addEventListener('click', () => {
            captureZone.classList.add('listening');
            setTimeout(() => captureZone.classList.remove('listening'), 200);
        });

        // Clear history
        clearBtn.addEventListener('click', () => {
            eventHistory = [];
            renderHistory();
            captureZone.classList.remove('captured');
            zoneIcon.textContent = '⌨️';
            zoneText.textContent = 'Press any key to capture event';
            document.querySelector('.zone-hint').textContent = 'Keyboard events will be captured here';
            lastEventSection.style.display = 'none';
            lastEventData = null;
        });

        // Copy last event
        copyBtn.addEventListener('click', async () => {
            if (!lastEventData) {
                showToast('No event to copy!');
                return;
            }

            const combo = getKeyComboString(lastEventData);
            const code = lastEventData.code;
            const key = lastEventData.key;
            const keyCode = lastEventData.keyCode;
            
            const text = `${combo} | code: "${code}" | key: "${key}" | keyCode: ${keyCode}`;
            
            try {
                await navigator.clipboard.writeText(text);
                showToast('Copied to clipboard!');
            } catch (err) {
                showToast('Failed to copy');
            }
        });

        // History item click to view (handled in renderHistory)

        // Focus the page on load to capture keys immediately
        window.addEventListener('load', () => {
            captureZone.focus();
        });
    </script>

    <footer style="text-align: center; padding: 24px; color: var(--text-secondary); font-size: 0.8rem; border-top: 1px solid var(--border);">
        Built with ❤️ by QQ & <a href="https://qqshi13.github.io/nova/" target="_blank" style="color: var(--accent); text-decoration: none;">Nova ☄️</a>
    </footer>
</body>
</html>
